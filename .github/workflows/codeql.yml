name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: kotlin
        # Only scan source directories, skip generated and build output
        config: |
          paths:
            - library/core/src
            - library/engines/android/src
            - library/plugins
            - library/legacy/src

    - name: Build Android and JVM targets for CodeQL
      run: ./gradlew -p ./library :core:compileDebugKotlinAndroid :engines:android:compileDebugKotlinAndroid --no-daemon
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:kotlin"
