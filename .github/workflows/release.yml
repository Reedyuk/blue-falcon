name: Release

on:
  release:
    types: [released]

permissions:
  contents: read

env:
  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPEUSERNAME }}
  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPEPASSWORD }}
  ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY }}
  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASS }}

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build all modules
      run: ./gradlew -p ./library build --parallel --no-daemon
      
    - name: Publish to Maven Central
      run: ./gradlew -p ./library publishAllPublicationsToMavenCentralRepository --no-daemon
      
    - name: Print published artifacts
      run: |
        echo "✅ Published Blue Falcon 3.0 modules:"
        echo "  • blue-falcon-core"
        echo "  • blue-falcon-engine-android"
        echo "  • blue-falcon-engine-ios"
        echo "  • blue-falcon-engine-macos"
        echo "  • blue-falcon-engine-js"
        echo "  • blue-falcon-engine-windows"
        echo "  • blue-falcon-engine-rpi"
        echo "  • blue-falcon-plugin-logging"
        echo "  • blue-falcon-plugin-retry"
        echo "  • blue-falcon-plugin-caching"
        echo "  • blue-falcon (legacy compatibility)"

  verify-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Verify Windows engine compiles
      run: ./gradlew.bat -p ./library :engines:windows:build --no-daemon
