name: Pull-Requests

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build all modules
      run: ./gradlew -p ./library build --parallel --no-daemon
      
    - name: Run tests
      run: ./gradlew -p ./library test --no-daemon"

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      
    - name: Build Windows engine
      run: ./gradlew.bat -p ./library :engines:windows:build --no-daemon
      
  verify-structure:
    name: Verify Module Structure
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Verify module structure
      run: |
        echo "Verifying Blue Falcon 3.0 module structure..."
        
        modules=(
          "core"
          "engines/android"
          "engines/ios"
          "engines/macos"
          "engines/js"
          "engines/windows"
          "engines/rpi"
          "plugins/logging"
          "plugins/retry"
          "plugins/caching"
          "legacy"
        )
        
        for module in "${modules[@]}"; do
          if [ -f "library/$module/build.gradle.kts" ]; then
            echo "✅ $module"
          else
            echo "❌ Missing: library/$module/build.gradle.kts"
            exit 1
          fi
        done
        
        echo "✅ All modules present!"
